<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JSON Spark</title>
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<div class="popup">
			<header class="popup__header">
				<span class="popup__icon">⚡</span>
				<h1 class="popup__title">JSON Spark</h1>
				<span class="popup__version">v2.0.0</span>
			</header>
			<p class="popup__description">
				The JSON tool you can trust.<br />
				Fast, beautiful, private.
			</p>
			<div class="popup__actions">
				<button id="paste-json" class="popup__button">📋 Paste JSON</button>
				<button id="toggle-scratchpad" class="popup__button">
					📝 Scratch Pad
				</button>
				<a href="options.html" target="_blank" class="popup__link"
					>⚙ Settings</a
				>
			</div>
			<div id="scratchpad" class="popup__scratchpad" style="display: none">
				<textarea
					id="scratchpad-input"
					class="popup__textarea"
					placeholder="Paste JSON here..."
				></textarea>
				<div class="popup__scratchpad-actions">
					<button
						id="scratchpad-prettify"
						class="popup__button popup__button--sm"
					>
						{ } Prettify
					</button>
					<button
						id="scratchpad-minify"
						class="popup__button popup__button--sm"
					>
						{} Minify
					</button>
					<button id="scratchpad-open" class="popup__button popup__button--sm">
						↗ Open
					</button>
				</div>
			</div>
			<footer class="popup__footer">
				<a
					href="https://github.com/jrodrigopuca/json-spark"
					target="_blank"
					rel="noopener noreferrer"
				>
					GitHub
				</a>
				<span>·</span>
				<span>GPL-3.0</span>
			</footer>
		</div>
		<script type="module" src="popup.ts"></script>
	</body>
</html>
